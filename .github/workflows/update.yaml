name: Update Test Blueprint

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: Update blueprint version and date
        id: update_version
        run: |
          FILE="blueprints/test_blueprint.yaml"
          CURRENT_DATE=$(date +"%Y-%m-%d")
          CURRENT_VERSION=$(grep -oP "^  version: \K[\d\.]+" $FILE)
          IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"
          NEW_PATCH=$((patch + 1))
          NEW_VERSION="$major.$minor.$NEW_PATCH"

          sed -i "s/^  version: .*/  version: $NEW_VERSION/" $FILE
          sed -i "s/^  last_updated: .*/  last_updated: \"$CURRENT_DATE\"/" $FILE

          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add blueprints/test_blueprint.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update test blueprint to version ${{ steps.update_version.outputs.NEW_VERSION }}"
            git pull --rebase origin main
            git push origin main
          fi
